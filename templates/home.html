{% extends "layout.html" %}

{% set title = 'Home' %}

{% block content %}
<div class="dashboard-layout">
    <aside class="dashboard-sidebar" id="home-sidebar-links" hidden>
        <div class="sidebar-title">Quick Actions</div>
        <a class="sidebar-link" id="home-sidebar-home-link" href="{{ url_for('home') }}">Home</a>
        <a class="sidebar-link" id="home-sidebar-dashboard-link" href="#">Dashboard</a>
        <a class="sidebar-link" id="home-sidebar-transaction-link" href="#">Add Transaction</a>
        <a class="sidebar-link" id="home-sidebar-asset-link" href="#">Add Asset</a>
    </aside>

    <div class="home-container home-message-panel">
        <div>
            <div class="welcome-text">
                <h1>Welcome to Portfolio Manager</h1>
                <p class="subtitle">Secure, offline-first asset management system.</p>
                <p class="subtitle home-user-welcome" id="home-user-welcome" hidden></p>
                <div class="welcome-divider"></div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
