{% extends "layout.html" %}

{% block content %}
	<section class="auth-section">
		<div class="auth-card">
			<header class="auth-header">
				<h1>Reset Password</h1>
				<p>Choose a new password for your account.</p>
			</header>

			<form id="resetPasswordForm" class="auth-form" novalidate>
				<div class="form-group">
					<label for="newPassword">New Password</label>
					<input
						type="password"
						class="form-control"
						id="newPassword"
						name="newPassword"
						placeholder="At least 8 characters"
						autocomplete="new-password"
						minlength="8"
						required>
				</div>

				<div class="form-group">
					<label for="confirmNewPassword">Confirm New Password</label>
					<input
						type="password"
						class="form-control"
						id="confirmNewPassword"
						name="confirmNewPassword"
						placeholder="Re-enter your new password"
						autocomplete="new-password"
						minlength="8"
						required>
				</div>

				<p id="resetPasswordError" class="auth-message auth-message-error" aria-live="polite"></p>
				<p id="resetPasswordSuccess" class="auth-message auth-message-success" aria-live="polite"></p>

				<button type="submit" id="resetPasswordSubmit" class="btn btn-primary auth-submit">Reset Password</button>
			</form>

			<p class="auth-helper-text">
				Back to login?
				<a href="{{ url_for('login_page') }}">Login here</a>
			</p>
		</div>
	</section>
{% endblock content %}

{% block scripts %}
	<script type="module" src="{{ url_for('static', path='js/reset-password.js') }}"></script>
{% endblock scripts %}
